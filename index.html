<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>임성은 | 이력서</title>

<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Pretendard', sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background-color: #f4f7f6;
    color: #1d1d1f;
    overflow-x: hidden;
    padding-top: 80px;
}

/* 🔥 상단 네비 */
.top-nav {
    position: fixed;
    top: 0;
    width: 100%;
    padding: 20px 40px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(255,255,255,0.2);
    backdrop-filter: blur(10px);
    z-index: 999;
}

.nav-logo {
    font-weight: 700;
    color: #3b82f6;
}

.nav-menu {
    display: flex;
    gap: 25px;
}

.nav-menu a {
    text-decoration: none;
    color: #1e293b;
    font-weight: 600;
}

.nav-menu a:hover {
    color: #3b82f6;
}

/* 오로라 */
.orb {
    position: fixed;
    border-radius: 50%;
    filter: blur(70px);
    z-index: -1;
    animation: floatOrb 5s ease-in-out infinite alternate;
}

.orb-1 { width: 500px; height: 500px; background: rgba(79,172,254,0.45); top: -100px; left: -100px; }
.orb-2 { width: 600px; height: 600px; background: rgba(255,154,158,0.35); bottom: -150px; right: -100px; }
.orb-3 { width: 400px; height: 400px; background: rgba(161,196,253,0.45); top: 40%; left: 30%; }

@keyframes floatOrb {
    0% { transform: translate(0,0); }
    100% { transform: translate(50px,50px); }
}

/* 애니메이션 */
.fade-up {
    opacity: 0;
    transform: translateY(40px);
    transition: all 0.8s ease;
}

.fade-up.show {
    opacity: 1;
    transform: translateY(0);
}

/* 레이아웃 */
.container {
    max-width: 800px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    gap: 35px;
    padding: 60px 20px;
}

/* Hero */
.hero-section {
    width: 100%;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

.hero-card {
    background: rgba(255,255,255,0.25);
    border-radius: 24px;
    padding: 45px;
    text-align: center;
    backdrop-filter: blur(10px);
}

/* 카드 */
.glass-card {
    background: rgba(255,255,255,0.25);
    border-radius: 24px;
    padding: 45px;
    backdrop-filter: blur(10px);
}

/* 텍스트 */
.hero-name { font-size: 3rem; font-weight: 700; }
.hero-title { font-size: 1.5rem; color: #3b82f6; margin-bottom: 20px; }

.badge-container {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
    margin-top: 20px;
}

.badge {
    background: rgba(255,255,255,0.3);
    padding: 8px 20px;
    border-radius: 30px;
    font-size: 0.9rem;
    font-weight: 600;
}

</style>

</head>

<body>

<!-- 🔥 네비 -->

<nav class="top-nav">
    <div class="nav-logo">Resume</div>
    <div class="nav-menu">
        <a href="#about">소개</a>
        <a href="#skills">기술 스택</a>
        <a href="#experience">경력 및 학력</a>
        <a href="#portfolio">포트폴리오</a>
    </div>
</nav>

<!-- 오로라 -->

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<!-- 소개 -->

<section class="hero-section" id="about">
    <div class="hero-card">
        <h1 class="hero-name">임성은</h1>
        <div class="hero-title">개발자</div>
        <p>데이터 파이프라인 구축과 시스템 모니터링에 강점을 가진 개발자입니다.</p>
    </div>
</section>

<div class="container">

<!-- 기술 스택 -->
<section class="glass-card fade-up" id="skills">
    <h2>기술 스택</h2>

    <div class="badge-container">
        <span class="badge">Java</span>
        <span class="badge">C</span>
        <span class="badge">C#</span>
        <span class="badge">Python</span>
        <span class="badge">SQL</span>
        <span class="badge">JavaScript</span>
    </div>

    <div class="badge-container">
        <span class="badge">React</span>
        <span class="badge">JSP</span>
        <span class="badge">Servlet</span>
        <span class="badge">HTML5</span>
        <span class="badge">CSS3</span>
    </div>

    <div class="badge-container">
        <span class="badge">Unity</span>
        <span class="badge">Visual Studio</span>
        <span class="badge">VS Code</span>
    </div>

    <div class="badge-container">
        <span class="badge">MySQL</span>
        <span class="badge">Linux</span>
    </div>
</section>

<!-- 경력 -->
<section class="glass-card fade-up" id="experience">
    <h2>경력 및 학력</h2>
    <p>동양미래대학교 컴퓨터소프트웨어공학과</p>
    <p>2024.03 ~ 2027.02</p>
</section>

<!-- 포트폴리오 -->
<section class="glass-card fade-up" id="portfolio">
    <h2>포트폴리오</h2>
    <p>UPM 시스템 (C# + FastAPI 기반)</p>
</section>

</div>

<script>
const observer = new IntersectionObserver((entries)=>{
    entries.forEach(entry=>{
        if(entry.isIntersecting){
            entry.target.classList.add('show');
        }
    });
},{threshold:0.2});

document.querySelectorAll('.fade-up').forEach(el=>{
    observer.observe(el);
});
</script>

</body>
</html>
